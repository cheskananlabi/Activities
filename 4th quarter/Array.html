    <script>
        const cars = [];
            cars [0] = "Tiktok",
            cars [1] = "Instagram", 
            cars [2] = "Facebook"
            document.getElementById("apps").innerHTML = cars;

        // Bracket Indexing Example
        const apps = ["Tiktok", "Instagram", "Facebook"];
        document.getElementById("app2").innerHTML = apps[0];  

        // Array as Object Example
        const name = {firstName: "Cheska", lastName: "Nanlabi"};
        document.getElementById("name").innerHTML = name.firstName;

        // Length Property Example
        const fruits = ["Banana", "Orange", "Apple", "Mango", "Grapes"];
        let size = fruits.length;
        document.getElementById("fruits").innerHTML = size;

        // Concat
        const surname1 = ["Cabias", "Nanlabi", "Camacho"];
        const surname2 = ["Canete", "Visca", "Carlon"];
        const ppg = surname1.concat(surname2);
        document.getElementById("ppg").innerHTML = ppg;

        // copywithin
        const colors = ["Purple", "Pink", "Green", "Blue", "Black"];
        colors.copyWithin(3, 1);
        document.getElementById("colors").innerHTML = colors;
